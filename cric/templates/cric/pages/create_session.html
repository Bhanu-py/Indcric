{% extends 'base.html' %}

{% block title %}Create Session — IndCric{% endblock %}

{% block content %}
<div class="page-content-narrow">

    <a href="{% url 'home' %}" class="inline-flex items-center gap-1.5 text-sm text-stone-500 hover:text-stone-800 transition-colors mb-5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Dashboard
    </a>

    <div class="card">
        <div class="card-header">
            <h1 class="text-base font-bold text-stone-900">Create New Session</h1>
            <p class="text-xs text-stone-400 mt-0.5">Schedule a cricket session for the club</p>
        </div>
        <div class="card-body">
            <form method="post" id="create-session-form" class="space-y-5">
                {% csrf_token %}

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div class="sm:col-span-2">
                        <label class="form-label" for="name">Session Name</label>
                        <input class="form-input" id="name" name="name" type="text"
                               placeholder="e.g. Sunday Cricket — April 2025">
                    </div>

                    <div>
                        <label class="form-label" for="date">Date</label>
                        <input class="form-input" id="date" name="date" type="date">
                    </div>

                    <div>
                        <label class="form-label" for="time">Start Time</label>
                        <input class="form-input" id="time" name="time" type="time">
                    </div>

                    <div>
                        <label class="form-label" for="duration">Duration (hours)</label>
                        <input class="form-input" id="duration" name="duration" type="number"
                               placeholder="3" value="3" min="1" max="12">
                    </div>

                    <div>
                        <label class="form-label" for="cost">Total Cost (&euro;)</label>
                        <input class="form-input" id="cost" name="cost" type="number"
                               step="0.01" placeholder="80.00" value="80">
                    </div>

                    <div class="sm:col-span-2">
                        <label class="form-label" for="location">Venue</label>
                        <select class="form-select" id="location" name="location">
                            <option value="GUSB">GUSB</option>
                            <option value="Henry Storyplein">Henry Storyplein</option>
                        </select>
                    </div>
                </div>

                <div class="pt-2 flex items-center gap-3">
                    <button type="submit" class="btn btn-primary btn-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Create Session
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-secondary btn-md">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Create Poll for {{ match.name }}</h1>
    <form method="post" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="id_question">
                {{ form.question.label_tag }}
            </label>
            {{ form.question }}
        </div>
        <div class="mb-6">
            <label class="inline-flex items-center">
                {{ form.is_open }}
                <span class="ml-2 text-gray-700 text-sm font-bold">{{ form.is_open.label_tag }}</span>
            </label>
        </div>
        <div class="flex items-center justify-between">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" type="submit">
                Create Poll
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% extends 'layouts/blank.html' %}

{% block content %}
<div class="container mx-auto mt-10 p-5">
    <div class="max-w-2xl mx-auto bg-white shadow-md rounded-lg overflow-hidden">
        <div class="p-5">
            <h1 class="text-2xl font-bold mb-6">Account Settings</h1>

            <div class="space-y-6">
                <!-- Change Username -->
                <div>
                    <h2 class="text-xl font-semibold">Change Username</h2>
                    <div hx-get="{% url 'profile-usernamechange' %}" hx-trigger="load" hx-target="this">
                        <!-- Username form will be loaded here -->
                        <p class="text-gray-500">Loading...</p>
                    </div>
                </div>

                <!-- Change Email -->
                <div>
                    <h2 class="text-xl font-semibold">Change Email</h2>
                    <div hx-get="{% url 'profile-emailchange' %}" hx-trigger="load" hx-target="this">
                        <!-- Email form will be loaded here -->
                        <p class="text-gray-500">Loading...</p>
                    </div>
                </div>

                <!-- Delete Account -->
                <div>
                    <h2 class="text-xl font-semibold">Delete Account</h2>
                    <p class="text-gray-600">Permanently delete your account. This action cannot be undone.</p>
                    <div class="mt-4">
                        <a href="{% url 'profile-delete' %}" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                            Delete My Account
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Add Player — IndCric{% endblock %}

{% block content %}
<div class="page-content-narrow">

    <a href="{% url 'cric:manage-users' %}" class="inline-flex items-center gap-1.5 text-sm text-stone-500 hover:text-stone-800 transition-colors mb-5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Players
    </a>

    {% if message %}
    <div class="mb-4 p-4 rounded-xl text-sm font-medium
                {% if success %}bg-pitch-50 text-pitch-800 border border-pitch-200
                {% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
        {{ message }}
    </div>
    {% endif %}

    <div class="card">
        <div class="card-header">
            <h1 class="text-base font-bold text-stone-900">Add New Player</h1>
            <p class="text-xs text-stone-400 mt-0.5">Create a club member account</p>
        </div>
        <div class="card-body">
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="form-label" for="username">Username <span class="text-red-500">*</span></label>
                        <input class="form-input" id="username" name="username" type="text"
                               placeholder="e.g. john_doe" value="{{ username|default:'' }}" required>
                    </div>
                    <div>
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" id="email" name="email" type="email"
                               placeholder="john@example.com" value="{{ email|default:'' }}">
                    </div>
                    <div>
                        <label class="form-label" for="password">Password <span class="text-red-500">*</span></label>
                        <input class="form-input" id="password" name="password" type="password"
                               placeholder="Min. 8 characters" required>
                    </div>
                    <div>
                        <label class="form-label" for="role">Playing Role</label>
                        <select class="form-select" id="role" name="role">
                            <option value="batsman" {% if role == 'batsman' %}selected{% endif %}>🏏 Batsman</option>
                            <option value="bowler" {% if role == 'bowler' %}selected{% endif %}>🎯 Bowler</option>
                            <option value="allrounder" {% if role == 'allrounder' %}selected{% endif %}>⭐ All-rounder</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label" for="wallet_amount">Starting Wallet (&euro;)</label>
                        <input class="form-input" id="wallet_amount" name="wallet_amount"
                               type="number" step="0.01" placeholder="0.00" value="{{ wallet_amount|default:'0.00' }}">
                    </div>
                </div>

                <div class="pt-1">
                    <p class="text-xs font-semibold text-stone-500 uppercase tracking-wide mb-3">Permissions</p>
                    <div class="flex items-center gap-6">
                        <label class="flex items-center gap-2 cursor-pointer" for="is_staff">
                            <input type="checkbox" id="is_staff" name="is_staff"
                                   class="w-4 h-4 rounded border-stone-300 text-pitch-600 focus:ring-pitch-500"
                                   {% if is_staff %}checked{% endif %}>
                            <span class="text-sm font-medium text-stone-700">Staff</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer" for="is_superuser">
                            <input type="checkbox" id="is_superuser" name="is_superuser"
                                   class="w-4 h-4 rounded border-stone-300 text-pitch-600 focus:ring-pitch-500"
                                   {% if is_superuser %}checked{% endif %}>
                            <span class="text-sm font-medium text-stone-700">Admin</span>
                        </label>
                    </div>
                </div>

                <div class="pt-2 flex items-center gap-3">
                    <button type="submit" class="btn btn-primary btn-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                        Create Player
                    </button>
                    <a href="{% url 'cric:manage-users' %}" class="btn btn-secondary btn-md">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="mb-4 flex justify-between items-center">
        <h2 class="text-2xl font-bold">Create New User</h2>
    </div>

    {% if message %}
    <div class="mb-4 p-4 {% if success %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %} rounded">
        {{ message }}
    </div>
    {% endif %}

    <form method="post" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
        {% csrf_token %}
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2 !inline-block" for="username">Username*</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                   id="username" name="username" type="text" placeholder="Username" value="{{ username|default:'' }}" required>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2 !inline-block" for="email">Email</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                   id="email" name="email" type="email" placeholder="Email" value="{{ email|default:'' }}">
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2 !inline-block" for="password">Password*</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                   id="password" name="password" type="password" placeholder="Password" required>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2 !inline-block" for="role">Role</label>
            <select class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                    id="role" name="role">
                <option value="batsman" {% if role == 'batsman' %}selected{% endif %}>Batsman</option>
                <option value="bowler" {% if role == 'bowler' %}selected{% endif %}>Bowler</option>
                <option value="allrounder" {% if role == 'allrounder' %}selected{% endif %}>All-rounder</option>
            </select>
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2 !inline-block" for="wallet_amount">Wallet Amount</label>
            <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" 
                   id="wallet_amount" name="wallet_amount" type="number" step="0.01" placeholder="0.00" value="{{ wallet_amount|default:'0.00' }}">
        </div>
        
        <div class="mb-4">
            <div class="flex items-center">
                <input class="mr-2" type="checkbox" id="is_staff" name="is_staff" {% if is_staff %}checked{% endif %}>
                <label class="text-gray-700 text-sm !inline-block" for="is_staff">Staff User</label>
            </div>
        </div>
        
        <div class="mb-6">
            <div class="flex items-center">
                <input class="mr-2" type="checkbox" id="is_superuser" name="is_superuser" {% if is_superuser %}checked{% endif %}>
                <label class="text-gray-700 text-sm !inline-block" for="is_superuser">Admin User</label>
            </div>
        </div>
        
        <div class="flex items-center justify-between">
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline" 
                    type="submit">Create User</button>
            <a class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800" href="{% url 'manage-users' %}">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

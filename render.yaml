services:
  - type: web
    name: ICG
    runtime: python
    plan: free
    region: frankfurt
    branch: master
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn cric_core.wsgi --bind 0.0.0.0:$PORT --log-file -
    healthCheckPath: /accounts/login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CUSTOMCONNSTR_POSTGRESQL_CONNECTION_STRING
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

{% extends "base.html" %}
{% load static %}
{% block header %}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-stone-50 px-4 py-12">
    <div class="w-full max-w-sm">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex flex-col items-center gap-2">
                <div class="w-12 h-12 rounded-2xl bg-white border border-stone-200 flex items-center justify-center shadow-lg overflow-hidden">
                    <img src="{% static 'icons/logo-mark.png' %}" alt="ICG" class="w-full h-full object-contain">
                </div>
                <div>
                    <p class="text-lg font-bold text-stone-900 leading-tight">ICG</p>
                    <p class="text-xs text-stone-400">Cricket Club Manager</p>
                </div>
            </a>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
            <div class="h-1 w-full bg-gradient-to-r from-pitch-600 to-pitch-400"></div>
            <div class="px-7 py-7 allauth">
                {% block account_top %}{% endblock %}
                {% block account_content %}{% endblock %}
            </div>
        </div>

        <p class="text-center text-xs text-stone-400 mt-6">
            <a href="{% url 'account_login' %}" class="hover:text-stone-600 transition-colors">← Back to sign in</a>
        </p>
    </div>
</div>
{% endblock %}

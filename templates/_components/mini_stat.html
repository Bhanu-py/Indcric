{% comment %}
Compact stat: big mono value + tiny uppercase label. For career/summary grids.
Usage: {% include "_components/mini_stat.html" with label="Runs" value=career.batting.runs %}
{% endcomment %}
<div>
    <div class="font-mono text-base font-semibold text-stone-900 tabular-nums leading-none">{{ value }}</div>
    <div class="font-mono text-[9px] text-stone-400 uppercase tracking-[0.08em] mt-1">{{ label }}</div>
</div>

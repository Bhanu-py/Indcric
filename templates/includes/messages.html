{% if messages %}
{% for message in messages %}
<div x-data="{ show: false }" x-init="setTimeout(() => show = true, 100); setTimeout(() => show = false, 5000)"
     class="fixed top-20 right-4 z-50 max-w-sm w-full pointer-events-none">
    <div x-show="show" x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-x-8 scale-95"
         x-transition:enter-end="opacity-100 translate-x-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-x-0 scale-100"
         x-transition:leave-end="opacity-0 translate-x-8 scale-95"
         class="pointer-events-auto flex items-start gap-3 rounded-2xl shadow-xl px-4 py-3.5 text-white
         {% if 'success' in message.tags %}bg-pitch-700
         {% elif 'error' in message.tags or 'danger' in message.tags %}bg-red-600
         {% elif 'warning' in message.tags %}bg-amber-500
         {% else %}bg-sky-600{% endif %}">
        <div class="shrink-0 mt-0.5">
            {% if 'success' in message.tags %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
            {% elif 'error' in message.tags or 'danger' in message.tags %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
            {% else %}
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            {% endif %}
        </div>
        <p class="text-sm font-medium leading-snug flex-1">{{ message }}</p>
        <button @click="show = false" class="shrink-0 mt-0.5 opacity-70 hover:opacity-100 transition-opacity">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
</div>
{% endfor %}
{% endif %}

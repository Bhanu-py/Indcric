<!-- GDPR Consent Modal - Show on first login or if consent missing -->
<!-- This modal uses Bootstrap 5 and displays as a fullscreen overlay -->
<div class="modal fade" id="consentModal" tabindex="-1" role="dialog" aria-labelledby="consentModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false" data-show-modal="{% if show_consent_modal %}true{% else %}false{% endif %}">
  <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
    <div class="modal-content" style="border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      <div class="modal-header" style="border-bottom: 1px solid #e5e7eb; padding: 24px;">
        <h5 class="modal-title" id="consentModalLabel" style="font-size: 1.5rem; font-weight: 700;">
          ⚖️ Legal Consent Required
        </h5>
      </div>
      <div class="modal-body" style="padding: 32px;">
        <form id="consentForm" method="post" action="{% url 'gdpr:consent_accept' %}">
          {% csrf_token %}
          <div class="mb-4">
            <p class="text-muted" style="font-size: 1rem; line-height: 1.5;">
              Please review and accept our terms to continue using Indcric.
            </p>
          </div>

          <div style="background-color: #f9fafb; padding: 16px; border-radius: 8px; margin-bottom: 20px;">
            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" name="privacy_policy_accepted" id="privacyCheck" required style="width: 20px; height: 20px; margin-top: 4px;">
              <label class="form-check-label" for="privacyCheck" style="margin-left: 12px; font-size: 1rem;">
                I accept the <a href="{% url 'gdpr:privacy_policy' %}" target="_blank" style="color: #2563eb; text-decoration: none;">Privacy Policy</a>
              </label>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" name="terms_accepted" id="termsCheck" required style="width: 20px; height: 20px; margin-top: 4px;">
              <label class="form-check-label" for="termsCheck" style="margin-left: 12px; font-size: 1rem;">
                I accept the <a href="{% url 'gdpr:terms_of_service' %}" target="_blank" style="color: #2563eb; text-decoration: none;">Terms of Service</a>
              </label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="whatsapp_accepted" id="whatsappCheck" required style="width: 20px; height: 20px; margin-top: 4px;">
              <label class="form-check-label" for="whatsappCheck" style="margin-left: 12px; font-size: 1rem;">
                I understand that WhatsApp is required to vote on polls
              </label>
            </div>
          </div>

          <div style="background-color: #e0f2fe; border-left: 4px solid #0284c7; padding: 16px; border-radius: 6px; margin-bottom: 24px;">
            <p style="margin: 0; font-size: 0.95rem; color: #0c4a6e;">
              <strong>Note:</strong> WhatsApp is optional for scoring but required to participate in voting. You can review our policies anytime in Account Settings.
            </p>
          </div>

          <button type="submit" class="btn btn-primary w-100" style="padding: 12px 24px; font-size: 1rem; font-weight: 600; border-radius: 8px;">
            Accept & Continue
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
// Show consent modal based on backend flag
document.addEventListener('DOMContentLoaded', function() {
  const consentModal = document.getElementById('consentModal');
  if (!consentModal) return;

  // Check if backend set the show-modal flag
  const shouldShowModal = consentModal.getAttribute('data-show-modal') === 'true';
  
  if (shouldShowModal) {
    // Use Bootstrap 5 modal
    const modal = new bootstrap.Modal(consentModal, {
      backdrop: 'static',
      keyboard: false
    });
    modal.show();
  }

  // Handle form submission
  const consentForm = document.getElementById('consentForm');
  if (consentForm) {
    consentForm.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const form = this;
      const formData = new FormData(form);
      
      fetch(form.action, {
        method: 'POST',
        body: formData,
        headers: {
          'X-Requested-With': 'XMLHttpRequest'
        }
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          // Close modal and redirect to dashboard
          try {
            const modal = bootstrap.Modal.getInstance(consentModal);
            if (modal) modal.hide();
          } catch (e) {}
          
          // Redirect to dashboard/home
          setTimeout(() => {
            window.location.href = '/';
          }, 500);
        } else {
          alert('Error accepting consent: ' + JSON.stringify(data.errors));
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Error accepting consent');
      });
    });
  }
});
</script>

<!-- GDPR Consent Modal - Alpine.js Modal for Tailwind CSS -->
<div x-data="consentModal()" @keydown.escape="open = false" x-cloak
     id="consentModal" data-show-modal="{% if show_consent_modal %}true{% else %}false{% endif %}">
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity duration-300"
       :class="{ 'opacity-0 pointer-events-none': !open, 'opacity-100': open }"
       @click="open = false">
  </div>

  <!-- Modal -->
  <div class="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4"
       :class="{ 'opacity-0 pointer-events-none': !open, 'opacity-100': open }"
       style="transition: opacity 0.3s ease-in-out;">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <!-- Header -->
      <div class="px-8 py-6 border-b border-stone-200 bg-gradient-to-r from-stone-50 to-white">
        <h2 class="text-2xl font-bold text-stone-900">⚖️ Legal Consent Required</h2>
        <p class="text-sm text-stone-600 mt-1">Please review and accept our terms to continue</p>
      </div>

      <!-- Body -->
      <div class="px-8 py-6">
        <form @submit.prevent="handleSubmit" id="consentForm">
          {% csrf_token %}
          
          <!-- Consent Checkboxes -->
          <div class="space-y-4 mb-6">
            <!-- Privacy Policy -->
            <label class="flex items-start gap-3 p-4 bg-stone-50 rounded-lg hover:bg-stone-100 transition cursor-pointer">
              <input type="checkbox" name="privacy_policy_accepted" 
                     class="mt-1 w-5 h-5 rounded border-stone-300 text-blue-600 focus:ring-blue-500"
                     required @change="checkAllFilled">
              <div class="flex-1">
                <span class="font-medium text-stone-900">Privacy Policy</span>
                <p class="text-sm text-stone-600 mt-0.5">
                  I accept the <a href="{% url 'gdpr:privacy_policy' %}" target="_blank" class="text-blue-600 hover:underline">Privacy Policy</a>
                </p>
              </div>
            </label>

            <!-- Terms of Service -->
            <label class="flex items-start gap-3 p-4 bg-stone-50 rounded-lg hover:bg-stone-100 transition cursor-pointer">
              <input type="checkbox" name="terms_accepted" 
                     class="mt-1 w-5 h-5 rounded border-stone-300 text-blue-600 focus:ring-blue-500"
                     required @change="checkAllFilled">
              <div class="flex-1">
                <span class="font-medium text-stone-900">Terms of Service</span>
                <p class="text-sm text-stone-600 mt-0.5">
                  I accept the <a href="{% url 'gdpr:terms_of_service' %}" target="_blank" class="text-blue-600 hover:underline">Terms of Service</a>
                </p>
              </div>
            </label>

            <!-- WhatsApp Consent -->
            <label class="flex items-start gap-3 p-4 bg-stone-50 rounded-lg hover:bg-stone-100 transition cursor-pointer">
              <input type="checkbox" name="whatsapp_accepted" 
                     class="mt-1 w-5 h-5 rounded border-stone-300 text-blue-600 focus:ring-blue-500"
                     required @change="checkAllFilled">
              <div class="flex-1">
                <span class="font-medium text-stone-900">WhatsApp for Voting</span>
                <p class="text-sm text-stone-600 mt-0.5">
                  I understand that WhatsApp is required to vote on polls
                </p>
              </div>
            </label>
          </div>

          <!-- Info Message -->
          <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded mb-6">
            <p class="text-sm text-blue-900">
              <strong>Note:</strong> WhatsApp is optional for scoring but required to participate in voting. You can review our policies anytime in Account Settings.
            </p>
          </div>

          <!-- Submit Button -->
          <button type="submit"
                  class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200"
                  :disabled="!allFilled"
                  :class="{ 'opacity-50 cursor-not-allowed': !allFilled }">
            <span x-show="!submitting">Accept & Continue</span>
            <span x-show="submitting" class="flex items-center justify-center gap-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Processing...
            </span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
function consentModal() {
  return {
    open: false,
    allFilled: false,
    submitting: false,
    
    init() {
      // Check if we should show modal on page load
      const shouldShow = document.getElementById('consentModal')?.getAttribute('data-show-modal') === 'true';
      if (shouldShow) {
        this.open = true;
      }
    },

    checkAllFilled() {
      const form = document.getElementById('consentForm');
      if (!form) {
        this.allFilled = false;
        return;
      }
      
      const privacy = form.querySelector('input[name="privacy_policy_accepted"]').checked;
      const terms = form.querySelector('input[name="terms_accepted"]').checked;
      const whatsapp = form.querySelector('input[name="whatsapp_accepted"]').checked;
      
      this.allFilled = privacy && terms && whatsapp;
    },

    async handleSubmit() {
      if (this.submitting) return;
      this.submitting = true;

      const form = document.getElementById('consentForm');
      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: {
            'X-Requested-With': 'XMLHttpRequest',
          }
        });

        const data = await response.json();

        if (data.status === 'success') {
          // Close modal and redirect
          this.open = false;
          setTimeout(() => {
            window.location.href = '/';
          }, 500);
        } else {
          alert('Error: ' + (data.message || 'Failed to accept consent'));
          this.submitting = false;
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error accepting consent');
        this.submitting = false;
      }
    }
  }
}
</script>

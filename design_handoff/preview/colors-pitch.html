<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Pitch — Primary Brand</div>
  <div style="display:grid;grid-template-columns:repeat(11,1fr);gap:6px;">
    <div><div class="swatch" style="background:var(--pitch-50)"></div><div class="swatch-label">50</div></div>
    <div><div class="swatch" style="background:var(--pitch-100)"></div><div class="swatch-label">100</div></div>
    <div><div class="swatch" style="background:var(--pitch-200)"></div><div class="swatch-label">200</div></div>
    <div><div class="swatch" style="background:var(--pitch-300)"></div><div class="swatch-label">300</div></div>
    <div><div class="swatch" style="background:var(--pitch-400)"></div><div class="swatch-label">400</div></div>
    <div><div class="swatch" style="background:var(--pitch-500)"></div><div class="swatch-label">500</div></div>
    <div><div class="swatch" style="background:var(--pitch-600)"></div><div class="swatch-label">600</div></div>
    <div><div class="swatch" style="background:var(--pitch-700);outline:2px solid var(--pitch-300);outline-offset:2px;"></div><div class="swatch-label" style="color:var(--pitch-700)">700★</div></div>
    <div><div class="swatch" style="background:var(--pitch-800)"></div><div class="swatch-label">800</div></div>
    <div><div class="swatch" style="background:var(--pitch-900)"></div><div class="swatch-label">900</div></div>
    <div><div class="swatch" style="background:var(--pitch-950)"></div><div class="swatch-label">950</div></div>
  </div>
  <div style="margin-top:14px;font-size:12px;color:var(--stone-500);">
    <span style="font-weight:600;color:var(--stone-700);">700</span> primary fill ·
    <span style="font-weight:600;color:var(--stone-700);">800</span> hover ·
    <span style="font-weight:600;color:var(--stone-700);">900</span> app header ·
    <span style="font-weight:600;color:var(--stone-700);">950</span> sign-in hero
  </div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Elevation &amp; Shadows</div>
  <div style="display:flex;gap:24px;align-items:flex-end;padding:8px 4px 18px;">
    <div style="text-align:center;">
      <div style="width:96px;height:64px;background:#fff;border:1px solid var(--stone-100);border-radius:14px;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05);"></div>
      <div class="swatch-label" style="margin-top:8px;">shadow-sm</div>
      <div class="swatch-hex">cards, default</div>
    </div>
    <div style="text-align:center;">
      <div style="width:96px;height:64px;background:#fff;border:1px solid var(--stone-100);border-radius:14px;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.06);"></div>
      <div class="swatch-label" style="margin-top:8px;">shadow-md</div>
      <div class="swatch-hex">card hover</div>
    </div>
    <div style="text-align:center;">
      <div style="width:96px;height:64px;background:#fff;border:1px solid var(--stone-100);border-radius:14px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.10), 0 4px 6px -4px rgb(0 0 0 / 0.05);"></div>
      <div class="swatch-label" style="margin-top:8px;">shadow-lg</div>
      <div class="swatch-hex">avatar ring</div>
    </div>
    <div style="text-align:center;">
      <div style="width:96px;height:64px;background:#fff;border:1px solid var(--stone-100);border-radius:14px;box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.10), 0 8px 10px -6px rgb(0 0 0 / 0.04);"></div>
      <div class="swatch-label" style="margin-top:8px;">shadow-xl</div>
      <div class="swatch-hex">dropdowns</div>
    </div>
  </div>
</div>
</body></html>

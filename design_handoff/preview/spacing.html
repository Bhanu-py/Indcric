<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Spacing Scale</div>
  <div style="display:flex;align-items:flex-end;gap:18px;">
    <div style="text-align:center;"><div style="width:4px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">1</div><div class="swatch-hex">4 px</div></div>
    <div style="text-align:center;"><div style="width:8px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">2</div><div class="swatch-hex">8 px</div></div>
    <div style="text-align:center;"><div style="width:12px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">3</div><div class="swatch-hex">12 px</div></div>
    <div style="text-align:center;"><div style="width:16px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">4</div><div class="swatch-hex">16 px</div></div>
    <div style="text-align:center;"><div style="width:20px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">5</div><div class="swatch-hex">20 px</div></div>
    <div style="text-align:center;"><div style="width:24px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">6</div><div class="swatch-hex">24 px</div></div>
    <div style="text-align:center;"><div style="width:32px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">8</div><div class="swatch-hex">32 px</div></div>
    <div style="text-align:center;"><div style="width:40px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">10</div><div class="swatch-hex">40 px</div></div>
    <div style="text-align:center;"><div style="width:48px;height:48px;background:var(--pitch-700);"></div><div class="swatch-label" style="margin-top:6px;">12</div><div class="swatch-hex">48 px</div></div>
  </div>
  <div style="margin-top:14px;font-size:12px;color:var(--stone-500);">Tailwind's 4-px scale, used end-to-end. Card padding is 5–6 (20–24), gap-between-cards 4 (16).</div>
</div>
</body></html>

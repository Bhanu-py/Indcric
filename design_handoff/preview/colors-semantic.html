<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Accent &amp; Semantic</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;">
    <div>
      <div class="swatch" style="background:var(--amber-500)"></div>
      <div class="swatch-label">Amber 500</div>
      <div class="swatch-hex">Captain · CTA</div>
    </div>
    <div>
      <div class="swatch" style="background:var(--emerald-500)"></div>
      <div class="swatch-label">Emerald 500</div>
      <div class="swatch-hex">Success · vote</div>
    </div>
    <div>
      <div class="swatch" style="background:var(--red-500)"></div>
      <div class="swatch-label">Red 500</div>
      <div class="swatch-hex">Danger</div>
    </div>
    <div>
      <div class="swatch" style="background:var(--sky-500)"></div>
      <div class="swatch-label">Sky 500</div>
      <div class="swatch-hex">Info · batsman</div>
    </div>
    <div>
      <div class="swatch" style="background:var(--purple-800)"></div>
      <div class="swatch-label">Purple 800</div>
      <div class="swatch-hex">Allrounder</div>
    </div>
    <div>
      <div class="swatch" style="background:var(--pitch-700)"></div>
      <div class="swatch-label">Pitch 700</div>
      <div class="swatch-hex">Primary</div>
    </div>
  </div>
</div>
</body></html>

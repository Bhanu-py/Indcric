<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="padding:0;overflow:hidden;">
  <!-- Mimics the in-app session card -->
  <div style="height:4px;background:var(--pitch-600);"></div>
  <div style="padding:20px 22px;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
      <span class="badge badge-pitch" style="background:var(--pitch-50);color:var(--pitch-800);">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Sun · 14 Jun
      </span>
    </div>
    <div style="font-size:16px;font-weight:700;color:var(--stone-900);">Friday Hall Nets</div>
    <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--stone-500);margin-top:4px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.83 0L6.343 16.66a8 8 0 1111.314 0z"/><circle cx="12" cy="11" r="3"/></svg>
      Ghent Sporthal · 19:00 · 2h
    </div>
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--stone-100);">
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:11px;margin-bottom:6px;">
        <span style="color:var(--stone-600);font-weight:500;">Availability poll</span>
        <div style="display:flex;gap:6px;">
          <span class="badge badge-green">7 Yes</span>
          <span class="badge badge-red">2 No</span>
        </div>
      </div>
      <div style="height:8px;border-radius:9999px;background:var(--stone-100);overflow:hidden;">
        <div style="height:100%;width:78%;background:var(--emerald-500);border-radius:9999px;"></div>
      </div>
    </div>
  </div>
</div>
</body></html>

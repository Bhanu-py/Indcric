<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Buttons · Variants</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
    <button class="btn btn-primary">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      New Session
    </button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-amber">Sign Up</button>
    <button class="btn btn-success">Mark Paid</button>
    <button class="btn btn-danger">Delete</button>
    <button class="btn btn-ghost">More</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px;">
    <button class="btn btn-primary btn-sm">btn-sm</button>
    <button class="btn btn-primary">btn-md (default)</button>
    <button class="btn btn-primary btn-lg">btn-lg</button>
  </div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Radius Scale</div>
  <div style="display:flex;align-items:flex-end;gap:18px;">
    <div style="text-align:center;"><div style="width:64px;height:64px;background:var(--pitch-100);border:1px solid var(--pitch-200);border-radius:8px;"></div><div class="swatch-label" style="margin-top:6px;">rounded-lg</div><div class="swatch-hex">8 · nav, chip</div></div>
    <div style="text-align:center;"><div style="width:64px;height:64px;background:var(--pitch-200);border-radius:12px;"></div><div class="swatch-label" style="margin-top:6px;">rounded-xl</div><div class="swatch-hex">12 · btn, input</div></div>
    <div style="text-align:center;"><div style="width:64px;height:64px;background:var(--pitch-400);border-radius:16px;"></div><div class="swatch-label" style="margin-top:6px;">rounded-2xl</div><div class="swatch-hex">16 · CARD</div></div>
    <div style="text-align:center;"><div style="width:64px;height:64px;background:var(--pitch-600);border-radius:9999px;"></div><div class="swatch-label" style="margin-top:6px;">rounded-full</div><div class="swatch-hex">badge, avatar</div></div>
    <div style="text-align:center;flex:1;padding-left:8px;">
      <div style="font-size:12px;color:var(--stone-500);text-align:left;line-height:1.55;">
        IndCric uses three radii in active rotation. Cards stay at <b>16</b>, buttons / inputs at <b>12</b>, and small chips drop to <b>8</b>. Pills &amp; avatars are fully round.
      </div>
    </div>
  </div>
</div>
</body></html>

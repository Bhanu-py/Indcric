<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Stone — Neutral Warm Grey</div>
  <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px;">
    <div><div class="swatch" style="background:var(--stone-50)"></div><div class="swatch-label">50</div></div>
    <div><div class="swatch" style="background:var(--stone-100)"></div><div class="swatch-label">100</div></div>
    <div><div class="swatch" style="background:var(--stone-200)"></div><div class="swatch-label">200</div></div>
    <div><div class="swatch" style="background:var(--stone-300)"></div><div class="swatch-label">300</div></div>
    <div><div class="swatch" style="background:var(--stone-400)"></div><div class="swatch-label">400</div></div>
    <div><div class="swatch" style="background:var(--stone-500)"></div><div class="swatch-label">500</div></div>
    <div><div class="swatch" style="background:var(--stone-600)"></div><div class="swatch-label">600</div></div>
    <div><div class="swatch" style="background:var(--stone-700)"></div><div class="swatch-label">700</div></div>
    <div><div class="swatch" style="background:var(--stone-800)"></div><div class="swatch-label">800</div></div>
    <div><div class="swatch" style="background:var(--stone-900)"></div><div class="swatch-label">900</div></div>
  </div>
  <div style="margin-top:14px;font-size:12px;color:var(--stone-500);">
    <span style="font-weight:600;color:var(--stone-700);">50</span> page bg ·
    <span style="font-weight:600;color:var(--stone-700);">100</span> card border ·
    <span style="font-weight:600;color:var(--stone-700);">400/500</span> meta text ·
    <span style="font-weight:600;color:var(--stone-700);">900</span> headings
  </div>
</div>
</body></html>

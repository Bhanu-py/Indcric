<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--stone-50); font-family: var(--font-sans);
               color: var(--stone-900); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; cursor: pointer; }
  button { font-family: inherit; }

  .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
  @media (max-width: 900px) { .grid-3 { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (max-width: 640px) { .grid-3 { grid-template-columns: 1fr; } }

  .login-hero { display: none; }
  @media (min-width: 1024px) { .login-hero { display: flex; } }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* Floating screen switcher (visible until Tweaks panel surfaces) */
  .screen-pills {
    position: fixed; left: 16px; bottom: 16px; z-index: 60;
    display: flex; flex-wrap: wrap; gap: 6px; max-width: 600px;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(6px);
    border: 1px solid var(--stone-100); border-radius: 9999px; padding: 4px;
    box-shadow: var(--shadow-md);
  }
  .screen-pill {
    padding: 5px 11px; border-radius: 9999px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 500; font-family: inherit; color: var(--stone-600);
    background: transparent; letter-spacing: 0.005em;
  }
  .screen-pill.on { background: var(--stone-900); color: #fff; }
  .screen-pill:hover { color: var(--stone-900); }
  .screen-pill.on:hover { color: #fff; }
</style>

function App() {
  // ── Tweaks ──
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "showOnboarding": false,
    "unreadBell": 3,
    "skipLogin": false,
    "showScreenSwitcher": true,
    "panelOpen": false
  }/*EDITMODE-END*/;
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [user, setUser] = useState(null);
  const [route, setRoute] = useState('home');
  const [openSession, setOpenSession] = useState(null);
  const [sessions, setSessions] = useState(initialSessions);
  const [showOnboarding, setShowOnboarding] = useState(t.showOnboarding);

  // Sync state when tweaks change
  useEffect(() => {
    setShowOnboarding(t.showOnboarding);
    if (t.skipLogin && !user) {
      setUser({ name:'Bhanu Tej', username:'bhanu', email:'bhanu@indcric.club', is_staff: true,
        batting:4.2, bowling:3.5, fielding:4.5, role:'allrounder',
        stats:{matches:12, runs:284, wickets:9, catches:6, stumpings:1 }});
    }
  }, [t.showOnboarding, t.skipLogin]);

  if (showOnboarding) {
    return (
      <OnboardingScreen
        onDone={(u) => { setShowOnboarding(false); setTweak('showOnboarding', false);
          setUser({...u, is_staff: false, name: u.name || 'New Member'}); setRoute('home'); }}
        onSkip={() => { setShowOnboarding(false); setTweak('showOnboarding', false); }}
      />
    );
  }

  if (!user) return (
    <LoginScreen onLogin={u => { setUser({...u, batting:4.2, bowling:3.5, fielding:4.5,
      role:'allrounder', stats:{matches:12, runs:284, wickets:9, catches:6, stumpings:1 }}); setRoute('home'); }}/>
  );

  const detailSession = openSession && {
    ...openSession,
    dateDay: openSession.dateDay || '14',
    dateMonth: openSession.dateMonth || 'JUN',
    teamA: ALL_PLAYERS.slice(0, 5),
    teamB: ALL_PLAYERS.slice(5, 10),
    userVote: 'yes',
  };

  const SCREENS = [
    { id:'home',          label:'Dashboard' },
    { id:'session',       label:'Session detail' },
    { id:'balance',       label:'Team balance' },
    { id:'match',         label:'Match result' },
    { id:'payments',      label:'Payments + settle' },
    { id:'profile',       label:'Profile' },
    { id:'notifications', label:'Notifications' },
    { id:'users',         label:'Members' },
    { id:'create-session',label:'Create session' },
  ];

  return (
    <>
      <Header user={user} route={route} unread={t.unreadBell}
              onLogout={() => setUser(null)}
              onNavigate={r => {
                setOpenSession(null);
                // session-detail needs a target
                if (r === 'session') setOpenSession(sessions.find(s => !s.past));
                setRoute(r);
              }}/>

      {route === 'home' && (
        <DashboardScreen user={user} sessions={sessions}
          onOpenSession={s => { setOpenSession(s); setRoute('session'); }}
          onDelete={s => setSessions(sessions.filter(x => x.id !== s.id))}
          onCreate={() => setRoute('create-session')}
          onNavigate={setRoute}/>
      )}
      {route === 'session' && (detailSession || openSession) && (
        <SessionDetailScreen session={detailSession || openSession} players={ALL_PLAYERS.slice(0,10)}
          currentUser={user} onBack={() => { setOpenSession(null); setRoute('home'); }}/>
      )}
      {route === 'balance' && (
        <TeamBalanceScreen session={openSession || sessions[0]} allPlayers={ALL_PLAYERS}
          onBack={() => setRoute('home')}/>
      )}
      {route === 'profile' && (
        <ProfileScreen user={user} onBack={() => setRoute('home')}/>
      )}
      {route === 'payments' && (
        <PaymentsScreen matches={PAYMENT_MATCHES} allPlayers={ALL_PLAYERS.slice(0,10)}
          onBack={() => setRoute('home')}/>
      )}
      {route === 'notifications' && (
        <NotificationsScreen items={NOTIFICATIONS} onBack={() => setRoute('home')}/>
      )}
      {route === 'match' && (
        <MatchResultScreen match={MATCH} onBack={() => setRoute('home')}/>
      )}
      {route === 'users' && <UsersScreen onBack={() => setRoute('home')}/>}
      {route === 'create-session' && <CreateSessionScreen onCancel={() => setRoute('home')}/>}

      {/* Floating screen switcher */}
      {t.showScreenSwitcher && (
        <div className="screen-pills">
          {SCREENS.map(s => (
            <button key={s.id} className={`screen-pill ${route === s.id ? 'on' : ''}`}
              onClick={() => {
                if (s.id === 'session') setOpenSession(sessions.find(x => !x.past));
                setRoute(s.id);
              }}>{s.label}</button>
          ))}
        </div>
      )}

      {/* Tweaks panel */}
      <TweaksPanel title="Tweaks" defaultOpen={t.panelOpen}>
        <TweakSection title="Prototype state">
          <TweakToggle label="Skip login (signed in)" value={t.skipLogin}
                       onChange={v => { setTweak('skipLogin', v); if (!v) setUser(null); }}/>
          <TweakToggle label="Show onboarding flow" value={t.showOnboarding}
                       onChange={v => { setTweak('showOnboarding', v); setShowOnboarding(v); }}/>
          <TweakToggle label="Floating screen switcher" value={t.showScreenSwitcher}
                       onChange={v => setTweak('showScreenSwitcher', v)}/>
        </TweakSection>
        <TweakSection title="Header">
          <TweakNumber label="Bell unread count" value={t.unreadBell} min={0} max={9}
                       onChange={v => setTweak('unreadBell', v)}/>
        </TweakSection>
        <TweakSection title="Jump to screen">
          <TweakSelect label="Screen" value={route}
                       options={[
                         {value:'home',          label:'Dashboard'},
                         {value:'session',       label:'Session detail'},
                         {value:'balance',       label:'Team balance / draft'},
                         {value:'match',         label:'Match result + scorecard'},
                         {value:'payments',      label:'Payments + settle'},
                         {value:'profile',       label:'Profile'},
                         {value:'notifications', label:'Notifications'},
                         {value:'users',         label:'Members'},
                         {value:'create-session',label:'Create session'},
                       ]}
                       onChange={v => {
                         if (v === 'session') setOpenSession(sessions.find(s => !s.past));
                         setRoute(v);
                       }}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

function UsersScreen({ onBack }) {
  return (
    <div style={{maxWidth:1024, margin:'0 auto', padding:'28px 24px'}}>

        display:'inline-flex', alignItems:'center', gap:6, fontSize:13, color:'var(--stone-500)',
        marginBottom:12, textDecoration:'none',
      }}>← Back</a>
      <h1 style={{fontSize:22, fontWeight:600, color:'var(--stone-900)', margin:'0 0 4px',
                  letterSpacing:'-0.02em'}}>Members</h1>
      <p style={{fontSize:13, color:'var(--stone-500)', margin:'0 0 22px'}}>
        {ALL_PLAYERS.length} club members
      </p>
      <div className="grid-3">
        {ALL_PLAYERS.map(p => (
          <Card key={p.username}>
            <div style={{padding:14, display:'flex', alignItems:'center', gap:12}}>
              <Avatar user={p} size={36}/>
              <div style={{minWidth:0, flex:1}}>
                <p style={{fontSize:13, fontWeight:600, color:'var(--stone-900)', margin:0,
                           overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
                           letterSpacing:'-0.005em'}}>{p.name}</p>
                <p style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--stone-400)',
                           margin:'2px 0 0'}}>@{p.username}</p>
              </div>
              <RoleBadge role={p.role} iconOnly/>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

function CreateSessionScreen({ onCancel }) {
  return (
    <div style={{maxWidth:560, margin:'0 auto', padding:'28px 24px'}}>
      <a onClick={onCancel} style={{fontSize:13, color:'var(--stone-500)', cursor:'pointer'}}>← Back</a>
      <h1 style={{fontSize:22, fontWeight:600, color:'var(--stone-900)', margin:'10px 0 4px',
                  letterSpacing:'-0.02em'}}>Create Session</h1>
      <p style={{fontSize:13, color:'var(--stone-500)', margin:'0 0 20px'}}>
        Pick a date, location, and the cost — IndCric will calculate per-player.
      </p>
      <Card>
        <div style={{padding:20, display:'flex', flexDirection:'column', gap:14}}>
          <Input label="Session name" placeholder="Sunday Nets"/>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
            <Input label="Date" placeholder="YYYY-MM-DD"/>
            <Input label="Time" placeholder="18:00"/>
          </div>
          <Input label="Location" placeholder="Sporthal Watersportbaan"/>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
            <Input label="Hall cost (€)" placeholder="72"/>
            <Input label="Duration (h)" placeholder="2"/>
          </div>
          <div style={{display:'flex', gap:8, paddingTop:4}}>
            <Button variant="primary" onClick={onCancel}>Create &amp; open poll</Button>
            <Button variant="secondary" onClick={onCancel}>Cancel</Button>
          </div>
        </div>
      </Card>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
